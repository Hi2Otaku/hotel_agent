name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_BUILDKIT: 1

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/*/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Lint backend
        run: |
          pip install ruff
          ruff check services/ tests/

      - name: Lint guest frontend
        run: cd frontend && npm ci && npm run lint

      - name: Lint staff frontend
        run: cd frontend-staff && npm ci && npm run lint

  backend-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Start infrastructure containers
        run: docker compose up -d auth_db room_db booking_db rabbitmq mailpit minio

      - name: Wait for databases
        run: |
          echo "Waiting for databases to be healthy..."
          for i in $(seq 1 30); do
            ALL_READY=true
            for svc in auth_db room_db booking_db; do
              if ! docker compose exec $svc pg_isready -q 2>/dev/null; then
                ALL_READY=false
              fi
            done
            if [ "$ALL_READY" = true ]; then
              echo "All databases ready"
              break
            fi
            echo "Attempt $i/30 - waiting..."
            sleep 5
          done
          sleep 5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/*/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r services/auth/requirements.txt
          pip install -r services/room/requirements.txt
          pip install -r services/booking/requirements.txt
          pip install -r services/gateway/requirements.txt
          pip install pytest pytest-asyncio httpx
          pip install shared/

      - name: Generate RSA keys for JWT
        run: |
          mkdir -p keys
          openssl genrsa -out keys/jwt-private.pem 2048
          openssl rsa -in keys/jwt-private.pem -pubout -out keys/jwt-public.pem

      - name: Run backend tests
        env:
          AUTH_DATABASE_URL: postgresql+asyncpg://auth_user:auth_pass@localhost:5433/auth
          ROOM_DATABASE_URL: postgresql+asyncpg://room_user:room_pass@localhost:5434/rooms
          BOOKING_DATABASE_URL: postgresql+asyncpg://booking_user:booking_pass@localhost:5435/bookings
          JWT_PRIVATE_KEY_PATH: keys/jwt-private.pem
          JWT_PUBLIC_KEY_PATH: keys/jwt-public.pem
          RABBITMQ_URL: amqp://hotel:hotel_pass@localhost:5672/
          MAIL_SERVER: localhost
          MAIL_PORT: "1025"
          MINIO_ENDPOINT: localhost:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          MINIO_BUCKET: hotelbook
          MINIO_SECURE: "false"
          ROOM_SERVICE_URL: http://localhost:8002
        run: pytest tests/ -x --tb=short

      - name: Teardown
        if: always()
        run: docker compose down -v

  frontend-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            frontend-staff/package-lock.json

      - name: Run guest frontend tests
        run: cd frontend && npm ci && npm test -- --run

      - name: Run staff frontend tests
        run: cd frontend-staff && npm ci && npm test -- --run

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Build and start full stack
        run: docker compose up -d --build

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        run: cd e2e && npm ci && npx playwright install --with-deps chromium

      - name: Wait for services
        run: |
          timeout 120 bash -c 'until curl -f http://localhost:8000/health 2>/dev/null; do sleep 2; done'

      - name: Run E2E tests
        run: cd e2e && npx playwright test

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: e2e/test-results/
          retention-days: 7

      - name: Teardown
        if: always()
        run: docker compose down -v

  build:
    runs-on: ubuntu-latest
    needs: e2e-tests
    steps:
      - uses: actions/checkout@v4

      - name: Build all Docker images
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml build

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/hotelbook
            git pull origin main
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build --remove-orphans
            docker system prune -f
